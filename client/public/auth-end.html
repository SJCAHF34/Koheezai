<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign-in complete</title>
    <script src="https://res.cdn.office.net/teams-js/2.24.0/js/MicrosoftTeams.min.js"></script>
  </head>
  <body>
    <p>Completing sign-in…</p>
    <script>
      // Completes a Microsoft Teams authentication popup. Reads the result from
      // the URL hash and hands it back to the calling tab.
      microsoftTeams.app.initialize().then(function () {
        var hash = window.location.hash.substring(1);
        var params = new URLSearchParams(hash);
        var error = params.get("error");
        if (error) {
          microsoftTeams.authentication.notifyFailure(error);
        } else {
          microsoftTeams.authentication.notifySuccess(hash || "ok");
        }
      });
    </script>
  </body>
</html>
